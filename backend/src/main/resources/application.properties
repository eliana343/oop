# School demo: in-memory database (no install). Just run the Java app.
spring.datasource.url=jdbc:h2:mem:hotel;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# If you use PostgreSQL instead: comment the 3 lines above and uncomment:
# spring.datasource.url=jdbc:postgresql://localhost:5432/hotel_reservation
# spring.datasource.username=postgres
# spring.datasource.password=postgres

server.port=8080
